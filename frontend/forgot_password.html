<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password | VendorBot</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/waskita logo.png">
    <link rel="shortcut icon" type="image/png" href="assets/images/waskita logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
        }

        .input-field {
            transition: all 0.3s ease;
        }

        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(1, 3, 111, 0.3);
        }

        .submit-btn {
            background: linear-gradient(135deg, #01036f 0%, #02058f 100%);
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(1, 3, 111, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div
        class="w-full max-w-md bg-black/50 backdrop-blur-sm rounded-2xl shadow-2xl overflow-hidden border border-gray-800 p-8">

        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <img src="assets/images/waskita logo.png" alt="Waskita Logo" class="w-16 h-16 object-contain">
        </div>

        <!-- Header -->
        <div class="text-center space-y-2 mb-8">
            <h1 class="text-2xl font-bold text-white">Lupa Password?</h1>
            <p class="text-gray-400 text-sm">Masukkan email Anda untuk mereset password.</p>
        </div>

        <!-- Form -->
        <form id="forgotForm" class="space-y-6">
            <!-- Email Input -->
            <div class="space-y-2">
                <label for="email" class="text-sm font-medium text-gray-300 block">Email</label>
                <input type="email" id="email" name="email" placeholder="nama@email.com" required
                    class="input-field w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#01036f] focus:ring-2 focus:ring-[#01036f]/20">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn w-full py-3 rounded-lg font-semibold text-white shadow-lg">
                Kirim Link Reset
            </button>
        </form>

        <!-- Back Link -->
        <div class="mt-6 text-center">
            <a href="login.html" class="text-blue-400 hover:text-blue-300 font-medium text-sm transition-colors">
                &larr; Kembali ke Login
            </a>
        </div>
    </div>

    <!-- Script -->
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim().toLowerCase();
            if (!email) {
                showNotification('Masukkan email Anda', 'error');
                return;
            }

            const btn = document.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = 'Memproses...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    showNotification(data.message, 'success');
                    // Reset form
                    document.getElementById('forgotForm').reset();
                } else {
                    showNotification(data.error || 'Gagal mengirim permintaan', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Kesalahan koneksi', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Kirim Link Reset';
            }
        });

        // Show notification function (Shared logic)
        function showNotification(message, type) {
            const existingNotifications = document.querySelectorAll('.notification-toast');
            existingNotifications.forEach(notif => notif.remove());

            const notification = document.createElement('div');
            notification.className = 'notification-toast fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-lg transition-all duration-300 transform translate-x-full ' +
                (type === 'success' ? 'bg-green-600' : 'bg-red-600') + ' text-white font-medium';
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.transform = 'translateX(0)';
            }, 100);

            setTimeout(() => {
                notification.style.transform = 'translateX(400px)';
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        }
    </script>
</body>

</html>
