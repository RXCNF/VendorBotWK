<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | VendorBot</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/waskita logo.png">
    <link rel="shortcut icon" type="image/png" href="assets/images/waskita logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
        }

        .input-field {
            transition: all 0.3s ease;
        }

        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(1, 3, 111, 0.3);
        }

        .submit-btn {
            background: linear-gradient(135deg, #01036f 0%, #02058f 100%);
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(1, 3, 111, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div
        class="w-full max-w-md bg-black/50 backdrop-blur-sm rounded-2xl shadow-2xl overflow-hidden border border-gray-800 p-8">

        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <img src="assets/images/waskita logo.png" alt="Waskita Logo" class="w-16 h-16 object-contain">
        </div>

        <!-- Header -->
        <div class="text-center space-y-2 mb-8">
            <h1 class="text-2xl font-bold text-white">Buat Password Baru</h1>
            <p class="text-gray-400 text-sm">Masukkan password baru untuk akun Anda.</p>
        </div>

        <!-- Form -->
        <form id="resetForm" class="space-y-6">
            <input type="hidden" id="token" name="token">
            <input type="hidden" id="email" name="email">

            <!-- Password Input -->
            <div class="space-y-2">
                <label for="password" class="text-sm font-medium text-gray-300 block">Password Baru</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6"
                    class="input-field w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#01036f] focus:ring-2 focus:ring-[#01036f]/20">
            </div>

            <!-- Confirm Password Input -->
            <div class="space-y-2">
                <label for="confirmPassword" class="text-sm font-medium text-gray-300 block">Konfirmasi Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required
                    minlength="6"
                    class="input-field w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#01036f] focus:ring-2 focus:ring-[#01036f]/20">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn w-full py-3 rounded-lg font-semibold text-white shadow-lg">
                Ubah Password
            </button>
        </form>
    </div>

    <!-- Script -->
    <script>
        // Get params
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        if (token) document.getElementById('token').value = token;
        if (email) document.getElementById('email').value = email;

        if (!token || !email) {
            showNotification('Link tidak valid atau kadaluarsa', 'error');
            document.querySelector('.submit-btn').disabled = true;
        }

        document.getElementById('resetForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const tokenVal = document.getElementById('token').value;
            const emailVal = document.getElementById('email').value;

            if (password !== confirmPassword) {
                showNotification('Password tidak cocok!', 'error');
                return;
            }

            const btn = document.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = 'Memproses...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailVal, token: tokenVal, newPassword: password })
                });

                const data = await response.json();

                if (response.ok) {
                    showNotification('Password berhasil diubah! Mengalihkan...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showNotification(data.error || 'Gagal mengubah password', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Ubah Password';
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Kesalahan koneksi', 'error');
                btn.disabled = false;
                btn.textContent = 'Ubah Password';
            }
        });

        function showNotification(message, type) {
            const existingNotifications = document.querySelectorAll('.notification-toast');
            existingNotifications.forEach(notif => notif.remove());

            const notification = document.createElement('div');
            notification.className = 'notification-toast fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-lg transition-all duration-300 transform translate-x-full ' +
                (type === 'success' ? 'bg-green-600' : 'bg-red-600') + ' text-white font-medium';
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.transform = 'translateX(0)';
            }, 100);

            setTimeout(() => {
                notification.style.transform = 'translateX(400px)';
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        }
    </script>
</body>

</html>
